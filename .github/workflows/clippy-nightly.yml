name: Clippy Nightly

on:
  schedule:
    # Run daily at 6:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache CUDA toolkit
        id: cache-cuda
        uses: actions/cache@v4
        with:
          path: ~/cuda-toolkit
          key: cuda-toolkit-12-6-ubuntu2404-v5

      - name: Install CUDA toolkit
        if: steps.cache-cuda.outputs.cache-hit != 'true'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-6 libcublas-12-6 libcublas-dev-12-6
          mkdir -p ~/cuda-toolkit
          cp -a /usr/local/cuda-12.6/* ~/cuda-toolkit/

      - name: Restore CUDA toolkit from cache
        if: steps.cache-cuda.outputs.cache-hit == 'true'
        run: |
          sudo mkdir -p /usr/local/cuda-12.6
          sudo cp -a ~/cuda-toolkit/* /usr/local/cuda-12.6/
          sudo chmod -R a+rX /usr/local/cuda-12.6/
          sudo ldconfig

      - name: Set CUDA environment
        run: |
          echo "/usr/local/cuda-12.6/bin" >> $GITHUB_PATH
          CUDA_LIB="/usr/local/cuda-12.6/lib64"
          CUDA_TARGETS_LIB="/usr/local/cuda-12.6/targets/x86_64-linux/lib"
          echo "LD_LIBRARY_PATH=${CUDA_LIB}:${CUDA_TARGETS_LIB}:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          sudo ldconfig ${CUDA_LIB} ${CUDA_TARGETS_LIB}

      - name: Install Triton
        run: |
          python3 -m venv .venv
          .venv/bin/pip install triton
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: Install Rust nightly
        run: rustup toolchain install nightly --component clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-nightly-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Compute non-metal features
        run: |
          # Collect all feature names across every workspace member, then strip:
          #   - any feature with "metal" in its name (Apple-only)
          #   - pure dep-alias features (sole value is "dep:<feature-name>"),
          #     which only exist in one package and are rejected by other packages
          #     when passed via --features at the workspace level
          # The result covers every non-Apple code path without hardcoding names.
          FEATURES=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '
                .packages[].features
                | to_entries[]
                | . as $e
                | select(
                    ($e.value | length == 1 and .[0] == ("dep:" + $e.key)) | not
                  )
                | $e.key
              ' \
            | grep -v -i metal \
            | grep -v "^default$" \
            | sort -u \
            | tr '\n' ',')
          # Strip trailing comma
          FEATURES="${FEATURES%,}"
          echo "NON_METAL_FEATURES=$FEATURES" >> "$GITHUB_ENV"

      - name: Run Clippy nightly (pedantic)
        run: cargo +nightly clippy --all --features "$NON_METAL_FEATURES" --exclude infernum-metal -- -W clippy::pedantic -D warnings
